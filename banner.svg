<svg xmlns="http://www.w3.org/2000/svg" width="800" height="230" viewBox="0 0 800 230" role="img" aria-label="Richard Carraro — Engenharia de Software, Curitiba">
  <style>
    text { font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
    .prompt { fill: #3fb950; font-size: 15px; }
    .cmd    { fill: #e6edf3; font-size: 15px; }
    .name   { fill: #e6edf3; font-size: 32px; font-weight: 700; }
    .info   { fill: #8b949e; font-size: 15px; }
    .dot    { fill: #58a6ff; }
    .bar    { fill: #6e7681; font-size: 12px; }
  </style>

  <!-- janela -->
  <rect x="1" y="1" width="798" height="228" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <path d="M1 13 a12 12 0 0 1 12 -12 h774 a12 12 0 0 1 12 12 v24 h-798 z" fill="#161b22"/>
  <circle cx="26" cy="19" r="6" fill="#f85149"/>
  <circle cx="48" cy="19" r="6" fill="#d29922"/>
  <circle cx="70" cy="19" r="6" fill="#3fb950"/>
  <text x="400" y="24" text-anchor="middle" class="bar">richard@curitiba — ~/perfil</text>

  <!-- máscaras do efeito de digitação -->
  <defs>
    <clipPath id="l1"><rect x="0" y="60"  width="0" height="30"><animate attributeName="width" from="0" to="270" dur="1.1s" begin="0.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="l2"><rect x="0" y="98"  width="0" height="46"><animate attributeName="width" from="0" to="330" dur="0.9s" begin="1.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="l3"><rect x="0" y="150" width="0" height="30"><animate attributeName="width" from="0" to="620" dur="1.5s" begin="2.8s" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#l1)">
    <text x="32" y="80"><tspan class="prompt">richard@curitiba</tspan><tspan class="cmd">:~$ whoami</tspan></text>
  </g>

  <g clip-path="url(#l2)">
    <text x="32" y="130" class="name">Richard Carraro</text>
  </g>

  <g clip-path="url(#l3)">
    <text x="32" y="170" class="info">Engenharia de Software <tspan class="dot">//</tspan> Estagiário de TI @ CRC-PR <tspan class="dot">//</tspan> Curitiba, BR</text>
  </g>

  <!-- prompt final com cursor piscando -->
  <text x="32" y="206" opacity="0">
    <tspan class="prompt">richard@curitiba</tspan><tspan class="cmd">:~$</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.5s" fill="freeze"/>
  </text>
  <rect x="215" y="193" width="9" height="16" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" values="1;0" calcMode="discrete" dur="1.1s" begin="4.6s" repeatCount="indefinite"/>
  </rect>
</svg>
